<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CarWorth | Prediction Result</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
    135deg,
    #000000,
    #0f172a,
    #111827
    );

    display:flex;
    justify-content:center;
    align-items:center;
}

.card{

    background:#0f172a;

    padding:50px;

    border-radius:25px;

    text-align:center;

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 20px 50px rgba(0,0,0,0.5);
}

h1{

    color:white;

    margin-bottom:20px;
}

.price{

    font-size:72px;

    font-weight:800;

    color:#3b82f6;

    margin:20px 0;
}

.sub{

    color:#94a3b8;

    margin-bottom:30px;
}

a{

    display:inline-block;

    text-decoration:none;

    padding:14px 28px;

    border-radius:12px;

    color:white;

    background:#2563eb;

    transition:0.3s;
}

a:hover{

    transform:translateY(-2px);
}

</style>

<link rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='favicon.png') }}">
      
</head>

<body>

<div class="card">

    <h1>Your Estimated Car Value</h1>

    <p class="sub">Estimated Market Value</p>

    <div class="price">
        ₹ {{ prediction }} L
    </div>

    <a href="/">
        Predict Another Vehicle
    </a>

</div>

</body>
</html>
